###############################################################################
# Gemma Theia IDE — Nginx Reverse Proxy
# ========================================
# Routes traffic to Theia and LLM server with WebSocket support,
# mobile-optimized headers, and optional SSL termination.
###############################################################################

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # Gzip compression for mobile performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream servers ────────────────────────────────────────────
    upstream theia {
        server theia:3000;
    }

    upstream llm_server {
        server llm-server:8000;
    }

    # ── HTTP Server ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # PWA / Mobile headers
        add_header Service-Worker-Allowed "/" always;
        add_header Cache-Control "no-cache" always;

        # ── LLM API routes ──────────────────────────────────────────
        location /api/ {
            proxy_pass http://llm_server/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # LLM health endpoint
        location /health {
            proxy_pass http://llm_server/health;
            proxy_http_version 1.1;
        }

        # ── Connection manager API ──────────────────────────────────
        location /api/connection/ {
            # Handled by a small Node.js middleware or Theia backend
            proxy_pass http://theia/api/connection/;
            proxy_http_version 1.1;
        }

        # ── PWA assets ──────────────────────────────────────────────
        location /manifest.json {
            proxy_pass http://theia;
            add_header Cache-Control "public, max-age=86400";
        }

        location /sw.js {
            proxy_pass http://theia;
            add_header Cache-Control "no-cache";
            add_header Service-Worker-Allowed "/";
        }

        location /mobile-styles.css {
            proxy_pass http://theia;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── Theia IDE (default) ─────────────────────────────────────
        location / {
            proxy_pass http://theia;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (required for Theia)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long timeout for WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Static asset caching ────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://theia;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── HTTPS Server (optional, when SSL certs are mounted) ─────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Same routing as HTTP
        location /api/ {
            proxy_pass http://llm_server/api/;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://theia;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
        }
    }
}
