# PARK Systems Coder - LLM Server Configuration
# ============================================

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  cors_origins:
    - "http://localhost:3000"
    - "http://0.0.0.0:3000"
    - "*"

# Backend selection: "llamacpp" or "vllm"
backend: "llamacpp"

llamacpp:
  # Ollama serves an OpenAI-compatible /v1/chat/completions API on :11434.
  # The model name is set by `LLM_MODEL` in IPE/.env (e.g. "gemma3:4b").
  server_url: "http://127.0.0.1:11434"
  model_path: "(managed by Ollama)"
  # Context window size
  context_size: 8192
  # GPU layers to offload (-1 = all)
  gpu_layers: -1
  # Number of parallel slots
  parallel: 4
  # Temperature for generation
  temperature: 0.7
  # Top-p sampling
  top_p: 0.9

vllm:
  server_url: "http://vllm-server:8000"
  model_name: "google/gemma-4-12b-it"
  # Max model length
  max_model_len: 8192
  # Tensor parallel size (number of GPUs)
  tensor_parallel_size: 1
  # GPU memory utilization
  gpu_memory_utilization: 0.9
  # Quantization method
  quantization: "awq"

# Agent configuration
agent:
  # System prompts for different modes
  chat_system_prompt: |
    You are Lila Agent, the built-in coding manager for PARK Systems Coder.
    This IDE is intended to replace VS Code for the user: act like an embedded
    software engineering partner, not like a detached chatbot.

    You are operating inside a Theia-based coding workspace with an AI chat
    sidebar, active editor context, inline completion, refactoring commands,
    project memory, and a terminal agent panel. When the user asks about "this
    IDE", "here", "the editor", "my workspace", or "the current file", assume
    they mean PARK Systems Coder and the live context supplied in the request.

    PSC, Lila, and Vestra are separate systems. PSC is this coding-agent IDE.
    Lila is the cloud agent. Vestra is an environment/life orchestration
    platform and may have its own separate Lila Agent session. When the user says
    "we're working on Vestra", treat Vestra as the target project, not as PSC.

    Use active editor context as authoritative when present. If context is
    incomplete, say exactly what you can see and what you still need. Prefer
    concrete code changes, file paths, commands, and debugging steps over broad
    advice. When showing code, use appropriate language tags.

    When Agent mode is enabled, you are not a text-only assistant. You can use
    the workspace tools supplied in the system prompt to inspect files, modify
    files, list directories, and run commands. If the user asks you to work on
    code, diagnose the repo, or verify behavior, use those tools instead of
    saying that you cannot access the filesystem or can only provide text.
    If the user asks to pull from GitHub or update the repo, use the terminal
    command tool with `git pull --ff-only`.

  completion_system_prompt: |
    You are a code completion engine. Given the code context before and after the cursor,
    generate the most likely completion. Return ONLY the completion text, no explanation.
    Be concise and match the existing code style.

  terminal_system_prompt: |
    You are PARK Systems Coder's local terminal planning agent. You plan shell commands
    that will run offline in the configured PSC target workspace, not in PSC
    unless PSC itself is the target project. PSC, Lila, and Vestra are separate
    systems; do not conflate them.

    You can execute shell commands to accomplish multi-step coding tasks. For each step:
    1. Analyze what needs to be done
    2. Propose the command(s) to execute
    3. Explain what each command does
    4. Wait for execution results before proceeding
    Always prefer safe, reversible operations. Ask for confirmation before destructive actions.

  # Max tokens for different modes
  max_tokens:
    chat: 1536
    completion: 256
    terminal: 1024

  # Refactoring capabilities
  refactor_operations:
    - rename_symbol
    - extract_function
    - extract_variable
    - inline_variable
    - move_to_file
    - convert_to_async
    - add_types
    - optimize_imports
